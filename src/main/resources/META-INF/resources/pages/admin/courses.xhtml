<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<f:view locale="#{languageBean.currentLocale}">
    <h:head>
        <title>Cursuri - Admin StudyHub</title>
        <f:loadBundle basename="messages" var="msg"/>
        <h:outputStylesheet library="css" name="common.css"/>
        <h:outputStylesheet library="css" name="for-you.css"/>
        <h:outputStylesheet library="css" name="admin.css"/>
    </h:head>

    <h:body>
        <div class="app">
            <ui:include src="/WEB-INF/templates/sidebar-admin.xhtml"/>

            <div class="main">
                <header class="topbar">
                    <div class="topbar-left">
                        <h2>Cursuri</h2>
                        <span>Gestionează cursurile platformei</span>
                    </div>
                    <div class="topbar-right">
                        <div style="position:relative;">
                            <div class="profile-btn" onclick="toggleDropdown()">
                                <div class="avatar">#{sessionBean.userInitials}</div>
                                <span>#{sessionBean.firstName}</span>
                                <span class="chevron">&#9660;</span>
                            </div>
                            <div class="dropdown" id="profileDropdown">
                                <div class="dropdown-header">
                                    <div class="d-name">#{sessionBean.fullName}</div>
                                    <div class="d-email">#{sessionBean.email}</div>
                                </div>
                                <div class="dropdown-sep"></div>
                                <h:outputLink value="#{request.contextPath}/logout"
                                              styleClass="dropdown-item danger">
                                    &#128682; Deconectare
                                </h:outputLink>
                            </div>
                        </div>
                    </div>
                </header>

                <main class="content admin-content">
                    <h:form id="coursesForm">

                        <p:messages globalOnly="true" styleClass="admin-messages"
                                    showDetail="false" closable="true"/>

                        <!-- TOOLBAR -->
                        <div class="admin-card" style="margin-bottom:1rem;">
                            <div class="admin-filters">
                                <div class="admin-filter-field">
                                    <label class="admin-filter-label">Specializare</label>
                                    <p:selectOneMenu value="#{adminCourseBean.filterSpecialization}"
                                                     styleClass="admin-filter-select">
                                        <f:selectItem itemValue="" itemLabel="Toate"/>
                                        <f:selectItems value="#{adminCourseBean.availableSpecializations}"
                                                       var="s" itemValue="#{s}" itemLabel="#{s}"/>
                                    </p:selectOneMenu>
                                </div>
                                <div class="admin-filter-field">
                                    <label class="admin-filter-label">An</label>
                                    <p:selectOneMenu value="#{adminCourseBean.filterYear}"
                                                     styleClass="admin-filter-select">
                                        <f:selectItem itemValue="#{null}" itemLabel="Toți anii"/>
                                        <f:selectItem itemValue="1" itemLabel="Anul 1"/>
                                        <f:selectItem itemValue="2" itemLabel="Anul 2"/>
                                        <f:selectItem itemValue="3" itemLabel="Anul 3"/>
                                        <f:selectItem itemValue="4" itemLabel="Anul 4"/>
                                    </p:selectOneMenu>
                                </div>
                                <div class="admin-filter-actions">
                                    <p:commandButton value="&#128269; Filtrează"
                                                     styleClass="admin-search-btn"
                                                     action="#{adminCourseBean.loadCourses()}"
                                                     update="coursesForm"
                                                     ajax="true"
                                                     process="coursesForm"/>
                                    <p:commandButton value="+ Curs nou"
                                                     styleClass="add-event-btn"
                                                     actionListener="#{adminCourseBean.prepareNew()}"
                                                     oncomplete="PF('editCourseDialog').show()"
                                                     update="editCourseForm"
                                                     ajax="true"/>
                                </div>
                            </div>
                        </div>

                        <!-- TABEL CURSURI -->
                        <div class="admin-card">
                            <div class="admin-card-title">
                                Cursuri (#{adminCourseBean.courses.size()})
                            </div>

                            <p:dataTable id="coursesTable"
                                         value="#{adminCourseBean.courses}"
                                         var="course"
                                         styleClass="admin-table"
                                         paginator="true"
                                         rows="15"
                                         paginatorTemplate="{FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink}"
                                         emptyMessage="Nu există cursuri.">

                                <p:column headerText="Nume curs">
                                    <div style="font-weight:500; color:var(--text-primary);">
                                        #{course.name}
                                    </div>
                                </p:column>

                                <p:column headerText="Profesor">
                                    <h:outputText value="#{course.professor != null ?
                                        course.professor.fullName : 'Nealocat'}"
                                                  style="#{course.professor == null ? 'color:var(--text-muted)' : ''}"/>
                                </p:column>

                                <p:column headerText="Specializare">
                                    <h:outputText value="#{course.specialization}"/>
                                </p:column>

                                <p:column headerText="An/Sem." style="width:80px; text-align:center;">
                                    <h:outputText value="#{course.studyYear}/#{course.semester}"/>
                                </p:column>

                                <p:column headerText="Credite" style="width:80px; text-align:center;">
                                    <span class="course-credits">#{course.credits}</span>
                                </p:column>

                                <p:column headerText="Status" style="width:90px; text-align:center;">
                                    <span class="status-badge #{course.isActive ? 'promoted' : 'failed'}">
                                        #{course.isActive ? 'Activ' : 'Inactiv'}
                                    </span>
                                </p:column>

                                <p:column headerText="Acțiuni" style="width:120px; text-align:center;">
                                    <div class="action-buttons">
                                        <p:commandButton
                                                icon="pi pi-pencil"
                                                styleClass="action-btn edit-btn-sm"
                                                title="Editează"
                                                actionListener="#{adminCourseBean.selectCourse(course)}"
                                                oncomplete="PF('editCourseDialog').show()"
                                                update="editCourseForm"
                                                ajax="true"/>
                                        <p:commandButton
                                                icon="#{course.isActive ? 'pi pi-ban' : 'pi pi-check'}"
                                                styleClass="action-btn #{course.isActive ? 'deactivate-btn-sm' : 'activate-btn-sm'}"
                                                title="#{course.isActive ? 'Dezactivează' : 'Activează'}"
                                                action="#{adminCourseBean.toggleActive(course)}"
                                                update="coursesForm"
                                                ajax="true"/>
                                        <p:commandButton
                                                icon="pi pi-trash"
                                                styleClass="action-btn delete-btn-sm"
                                                title="Șterge"
                                                action="#{adminCourseBean.deleteCourse(course)}"
                                                update="coursesForm"
                                                ajax="true">
                                            <p:confirm header="Confirmare"
                                                       message="Ștergi cursul #{course.name}?"/>
                                        </p:commandButton>
                                    </div>
                                </p:column>
                            </p:dataTable>
                        </div>

                        <p:confirmDialog global="true"
                                         widgetVar="confirmation"
                                         showEffect="fade"
                                         hideEffect="fade"
                                         styleClass="cal-confirm-dialog"
                                         width="400">
                            <p:commandButton value="Da, confirmă"
                                             type="button"
                                             styleClass="admin-confirm-yes-btn"
                                             onclick="PF('confirmation').accept()"/>
                            <p:commandButton value="Anulează"
                                             type="button"
                                             styleClass="admin-cancel-btn"
                                             onclick="PF('confirmation').reject()"/>
                        </p:confirmDialog>

                    </h:form>

                    <!-- DIALOG EDITARE/CREARE CURS -->
                    <h:form id="editCourseForm">
                        <p:dialog widgetVar="editCourseDialog"
                                  header="#{adminCourseBean.newCourse ? 'Curs nou' : 'Editează curs'}"
                                  modal="true"
                                  closable="true"
                                  width="520"
                                  styleClass="cal-dialog">

                            <h:panelGroup rendered="#{adminCourseBean.selectedCourse != null}">
                                <div class="edit-user-form">
                                    <div class="edit-form-grid">
                                        <div class="cal-field" style="grid-column: span 2;">
                                            <label class="cal-label">Nume curs *</label>
                                            <p:inputText value="#{adminCourseBean.selectedCourse.name}"
                                                         styleClass="cal-input"
                                                         required="true"
                                                         placeholder="ex: Programare Java"/>
                                        </div>
                                        <div class="cal-field" style="grid-column: span 2;">
                                            <label class="cal-label">Profesor</label>
                                            <p:selectOneMenu value="#{adminCourseBean.selectedCourse.professor}"
                                                             styleClass="cal-input"
                                                             converter="#{teacherConverter}">
                                                <f:selectItem itemValue="#{null}"
                                                              itemLabel="— Nealocat —"
                                                              noSelectionOption="true"/>
                                                <f:selectItems value="#{adminCourseBean.availableTeachers}"
                                                               var="teacher"
                                                               itemValue="#{teacher}"
                                                               itemLabel="#{teacher.fullName}"/>
                                            </p:selectOneMenu>
                                        </div>
                                        <div class="cal-field" style="grid-column: span 2;">
                                            <label class="cal-label">Specializare</label>
                                            <p:inputText value="#{adminCourseBean.selectedCourse.specialization}"
                                                         styleClass="cal-input"
                                                         placeholder="ex: Informatică"/>
                                        </div>
                                        <div class="cal-field">
                                            <label class="cal-label">An de studiu</label>
                                            <p:selectOneMenu value="#{adminCourseBean.selectedCourse.studyYear}"
                                                             styleClass="cal-input">
                                                <f:selectItem itemValue="#{null}" itemLabel="—"/>
                                                <f:selectItem itemValue="1" itemLabel="Anul 1"/>
                                                <f:selectItem itemValue="2" itemLabel="Anul 2"/>
                                                <f:selectItem itemValue="3" itemLabel="Anul 3"/>
                                                <f:selectItem itemValue="4" itemLabel="Anul 4"/>
                                            </p:selectOneMenu>
                                        </div>
                                        <div class="cal-field">
                                            <label class="cal-label">Semestru</label>
                                            <p:selectOneMenu value="#{adminCourseBean.selectedCourse.semester}"
                                                             styleClass="cal-input">
                                                <f:selectItem itemValue="#{null}" itemLabel="—"/>
                                                <f:selectItem itemValue="1" itemLabel="Semestrul 1"/>
                                                <f:selectItem itemValue="2" itemLabel="Semestrul 2"/>
                                            </p:selectOneMenu>
                                        </div>
                                        <div class="cal-field">
                                            <label class="cal-label">Credite</label>
                                            <p:inputText value="#{adminCourseBean.selectedCourse.credits}"
                                                         styleClass="cal-input"
                                                         placeholder="ex: 5"/>
                                        </div>
                                        <div class="cal-field cal-checkbox-row">
                                            <p:selectBooleanCheckbox
                                                    value="#{adminCourseBean.selectedCourse.isActive}"
                                                    styleClass="cal-checkbox"/>
                                            <label class="cal-checkbox-label">Curs activ</label>
                                        </div>
                                    </div>

                                    <div class="cal-actions">
                                        <p:commandButton
                                                value="#{adminCourseBean.newCourse ? 'Creează' : 'Salvează'}"
                                                styleClass="cal-save-btn"
                                                action="#{adminCourseBean.saveCourse()}"
                                                update="coursesForm editCourseForm"
                                                oncomplete="if(!args.validationFailed) PF('editCourseDialog').hide()"
                                                process="editCourseForm"
                                                ajax="true"/>
                                        <p:commandButton
                                                value="Anulează"
                                                styleClass="cal-cancel-btn"
                                                onclick="PF('editCourseDialog').hide(); return false;"
                                                ajax="false"/>
                                    </div>
                                </div>
                            </h:panelGroup>
                        </p:dialog>
                    </h:form>

                </main>
            </div>
        </div>

        <script>
            function toggleDropdown() {
                document.getElementById('profileDropdown').classList.toggle('open');
            }
            function closeDropdown() {
                document.getElementById('profileDropdown').classList.remove('open');
            }
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.profile-btn') &amp;&amp; !e.target.closest('.dropdown')) {
                    closeDropdown();
                }
            });
        </script>
    </h:body>
</f:view>
</html>
