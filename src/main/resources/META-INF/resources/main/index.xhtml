<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>StudyHub - Test PrimeFaces</title>
</h:head>

<h:body>
    <h2>Test PrimeFaces</h2>

    <h:form>
        <p:panel header="Salut de la PrimeFaces!">
            <p:outputLabel for="nume" value="Nume: " />
            <p:inputText id="nume" value="#{testController.nume}" />

            <br/><br/>

            <p:commandButton value="Trimite"
                             action="#{testController.saluta}"
                             update="mesaj" />

            <br/><br/>

            <p:outputPanel id="mesaj">
                <h:outputText value="#{testController.mesaj}"
                              rendered="#{not empty testController.mesaj}" />
            </p:outputPanel>
        </p:panel>
    </h:form>
</h:body>
</html>
