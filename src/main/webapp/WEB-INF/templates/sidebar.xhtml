<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition>
    <h:outputText value="#{sessionInitBean}" style="display:none"/>
    <aside class="sidebar">
        <h:outputStylesheet library="css" name="common.css"/>
        <div class="sidebar-logo">
            <h1>StudyHub</h1>
            <span>#{msg['sidebar.sub']}</span>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">#{msg['sidebar.menu']}</div>
            <h:outputLink value="#{request.contextPath}/main/for-you.xhtml"
                          styleClass="nav-item #{request.requestURI.contains('for-you') ? 'active' : ''}">
                <span class="nav-icon">&#127968;</span>
                #{msg['sidebar.foryou']}
            </h:outputLink>
            <h:outputLink value="#{request.contextPath}/pages/student/cursuri.xhtml"
                          styleClass="nav-item #{request.requestURI.contains('cursuri') ? 'active' : ''}">
                <span class="nav-icon">&#128218;</span>
                #{msg['sidebar.courses']}
            </h:outputLink>

            <div class="nav-section-label" style="margin-top:12px;">#{msg['sidebar.tools']}</div>
            <h:outputLink value="#{request.contextPath}/pages/student/calendar.xhtml"
                          styleClass="nav-item #{request.requestURI.contains('calendar') ? 'active' : ''}">
                <span class="nav-icon">&#128197;</span>
                Calendar
            </h:outputLink>
            <h:outputLink value="#{request.contextPath}/pages/student/note.xhtml"
                          styleClass="nav-item #{request.requestURI.contains('note') ? 'active' : ''}">
                <span class="nav-icon">&#128221;</span>
                #{msg['sidebar.grades']}
            </h:outputLink>
            <h:outputLink value="#{request.contextPath}/pages/student/rapoarte.xhtml"
                          styleClass="nav-item #{request.requestURI.contains('rapoarte') ? 'active' : ''}">
                <span class="nav-icon">&#128202;</span>
                #{msg['sidebar.reports']}
            </h:outputLink>
        </nav>

        <!-- LANGUAGE SWITCHER -->
        <div class="lang-switcher">
            <h:form id="langForm">
                <p:commandButton value="RO"
                                 styleClass="lang-btn #{languageBean.language eq 'ro' ? 'active' : ''}"
                                 action="#{languageBean.changeLanguage('ro')}"
                                 ajax="false"/>
                <span class="lang-divider">|</span>
                <p:commandButton value="EN"
                                 styleClass="lang-btn #{languageBean.language eq 'en' ? 'active' : ''}"
                                 action="#{languageBean.changeLanguage('en')}"
                                 ajax="false"/>
            </h:form>
        </div>

        <div class="sidebar-footer">
            <h:outputLink value="#{request.contextPath}/pages/student/profil.xhtml"
                          styleClass="sidebar-user">
                <div class="user-avatar-small">#{sessionBean.userInitials}</div>
                <div class="user-info-small">
                    <div class="name">#{sessionBean.fullName}</div>
                    <div class="role">#{sessionBean.role}</div>
                </div>
                <span>&#9881;</span>
            </h:outputLink>
        </div>
    </aside>
</ui:composition>
</html>
